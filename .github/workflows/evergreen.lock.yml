name: "Evergreen"
on:
  pull_request:
    types:
    - labeled
    - synchronize
    - reopened
    - ready_for_review
  push:
    branches:
    - main
  schedule:
  - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: "Agent caller context (used internally by Agentic Workflows)."
        required: false
        type: string
      head_sha:
        description: Expected PR head SHA from a trusted manual run.
        required: false
      pr:
        description: Pull request number to inspect.
        required: false
      reason:
        description: Manual run reason.
        required: false

permissions: {}

concurrency:
  cancel-in-progress: true
  group: gh-aw-${{ github.workflow }}-${{ github.event.inputs.pr || github.event.pull_request.number || github.ref || github.run_id }}

run-name: "Evergreen"

jobs:
  activation:
    needs:
      - pre_activation
      - preflight
    if: >
      needs.pre_activation.outputs.activated == 'true' && ((needs.preflight.outputs.should_run == 'true') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.id == github.repository_id))
    runs-on: ubuntu-slim
    permissions:
      actions: read
      contents: read
    env:
      GH_AW_MAX_DAILY_AI_CREDITS: ${{ vars.GH_AW_DEFAULT_MAX_DAILY_AI_CREDITS || '5000' }}
    outputs:
