name: Evergreen Trigger

on:
  pull_request_target:
    types: [labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
      pr_number: ${{ github.event.pull_request.number }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    steps:
      - id: scope
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          STATE: ${{ github.event.pull_request.state }}
        run: |
          if [ "$STATE" = "open" ] && echo "$LABELS" | grep -q '"evergreen"'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  evergreen:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    permissions:
      actions: write
      checks: read
      contents: write
      discussions: write
      issues: write
      pull-requests: write
      statuses: read
    uses: ./.github/workflows/evergreen.lock.yml
    with:
      pr_number: ${{ needs.gate.outputs.pr_number }}
      head_sha: ${{ needs.gate.outputs.head_sha }}
    secrets: inherit
